<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#gradient)"/>
  
  <!-- Grid/Parcel Lines -->
  <g stroke="white" stroke-width="1.5" stroke-linecap="round">
    <!-- Outer boundary -->
    <rect x="5" y="5" width="22" height="22" rx="2" fill="none"/>
    <!-- Horizontal lines -->
    <line x1="5" y1="12" x2="27" y2="12"/>
    <line x1="5" y1="19" x2="27" y2="19"/>
    <!-- Vertical lines -->
    <line x1="12" y1="5" x2="12" y2="27"/>
    <line x1="19" y1="12" x2="19" y2="27"/>
  </g>
  
  <!-- Location marker -->
  <circle cx="8.5" cy="8.5" r="2" fill="white"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
</svg>
